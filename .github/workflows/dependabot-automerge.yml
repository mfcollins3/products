#
# Automatically merges Dependabot pull requests for patch and minor
# updates to GitHub Actions dependencies. npm dependency PRs are
# intentionally excluded and require a human review.
name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Auto-merge Dependabot PR
    runs-on: ubuntu-24.04
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        # TODO: pin to SHA
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for Actions patch/minor updates
        # Only auto-merge GitHub Actions dependency updates.
        # npm updates (package-ecosystem: npm) require manual review.
        if: |
          steps.dependabot-metadata.outputs.package-ecosystem == 'github_actions' &&
          (
            steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor'
          )
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
